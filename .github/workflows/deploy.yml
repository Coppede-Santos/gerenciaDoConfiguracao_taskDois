name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a deployar'
        required: true
        type: choice
        options:
          - homolog
          - prod

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle ────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. Build JAR ───────────────────────────────────────────────────
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar --no-daemon

      # ── 5. Setup SSH ───────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Reintenta ssh-keyscan hasta 3 veces
          for i in 1 2 3; do
            ssh-keyscan -T 30 -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts && break
            echo "Intento $i fallido, reintentando..."
            sleep 5
          done
          # Verifica que known_hosts no está vacío
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ERROR: no se pudo obtener la host key de la VM"
            exit 1
          fi
          echo "SSH configurado correctamente"

      # ── 6. Copy files to VM ────────────────────────────────────────────
      - name: Copy JAR and Docker files to VM
        run: |
          ENV=${{ github.event.inputs.environment }}

          # Crea estructura de carpetas en la VM
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "mkdir -p ~/taskdois/${ENV}"

          # Copia el JAR renombrado como app.jar
          scp -i ~/.ssh/deploy_key \
            build/libs/*.jar \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/taskdois/${ENV}/app.jar

          # Copia el Dockerfile
          scp -i ~/.ssh/deploy_key \
            Dockerfile \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/taskdois/${ENV}/Dockerfile

          # Copia el docker-compose del ambiente correcto
          scp -i ~/.ssh/deploy_key \
            docker/${ENV}/docker-compose.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/taskdois/${ENV}/docker-compose.yml

          # Crea el .env con la contraseña de la BD
          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' > ~/taskdois/${ENV}/.env"

      # ── 7. Deploy ──────────────────────────────────────────────────────
      - name: Deploy containers
        run: |
          ENV=${{ github.event.inputs.environment }}

          ssh -i ~/.ssh/deploy_key ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "cd ~/taskdois/${ENV} && \
             docker compose down -v && \
             docker compose up -d --build && \
             echo 'Deploy de ${ENV} finalizado' && \
             docker compose ps"