name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a deployar'
        required: true
        type: choice
        options:
          - homolog
          - prod

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: self-hosted

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle ────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. Build JAR ───────────────────────────────────────────────────
      # O runner já está na VM, então compilamos direto aqui
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar --no-daemon

      # ── 5. Preparar arquivos de deploy ─────────────────────────────────
      - name: Prepare deploy files
        run: |
          ENV=${{ github.event.inputs.environment }}

          # Cria estrutura de pastas
          mkdir -p ~/taskdois/${ENV}

          # Copia o JAR como app.jar
          cp build/libs/*.jar ~/taskdois/${ENV}/app.jar

          # Copia o Dockerfile
          cp Dockerfile ~/taskdois/${ENV}/Dockerfile

          # Copia o docker-compose do ambiente correto
          cp docker/${ENV}/docker-compose.yml ~/taskdois/${ENV}/docker-compose.yml

          # Cria o .env com a senha do banco
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > ~/taskdois/${ENV}/.env

          echo "Arquivos copiados para ~/taskdois/${ENV}/"
          ls -la ~/taskdois/${ENV}/

      # ── 6. Deploy ──────────────────────────────────────────────────────
      - name: Deploy containers
        run: |
          ENV=${{ github.event.inputs.environment }}

          cd ~/taskdois/${ENV}

          # Derruba tudo (contenedores + volúmenes = ambiente desde cero)
          docker compose down

          # Sube tudo de novo (build da imagem + levanta contenedores)
          docker compose up -d --build

          echo "Deploy de ${ENV} finalizado"
          echo "Contenedores rodando:"
          docker compose ps