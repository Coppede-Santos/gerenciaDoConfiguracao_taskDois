name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-analyse:
    name: Build, Test & Analyse
    runs-on: ubuntu-latest

    # ── PostgreSQL service (needed for integration tests) ──────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskdois_test
          POSTGRES_USER: taskdois
          POSTGRES_PASSWORD: taskdois
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle dependencies ─────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. Grant execute permission to gradlew ───────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Compile ───────────────────────────────────────────────────────
      - name: Compile
        run: ./gradlew classes --no-daemon

      # ── 6. Checkstyle (Linter) ───────────────────────────────────────────
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain --no-daemon

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/

      # ── 7. PMD (Mess Detector) ───────────────────────────────────────────
      - name: Run PMD
        run: ./gradlew pmdMain --no-daemon

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: build/reports/pmd/

      # ── 8. Tests ─────────────────────────────────────────────────────────
      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/taskdois_test
          SPRING_DATASOURCE_USERNAME: taskdois
          SPRING_DATASOURCE_PASSWORD: taskdois

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

      # ── 9. Publish test results summary (visible in GitHub UI) ──────────
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

      # ── 10. Build JAR ────────────────────────────────────────────────────
      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 7
