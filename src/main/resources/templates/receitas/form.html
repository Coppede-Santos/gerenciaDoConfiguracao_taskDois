<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Receita</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f4; margin: 0; }
        .form-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 0.75rem 1.5rem; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .actions { display: flex; justify-content: space-between; margin-top: 1.5rem; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 th:text="${receita.id == null ? 'Nova Receita' : 'Editar Receita'}">Receita</h2>
    
    <form th:action="@{/receitas/salvar}" th:object="${receita}" method="post">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{dataRegistro}">
        
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" th:field="*{nome}" required>
        </div>
        
        <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea id="descricao" th:field="*{descricao}" rows="3" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="custo">Custo (R$):</label>
            <input type="number" id="custo" th:field="*{custo}" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label for="tipoReceita">Tipo de Receita:</label>
            <select id="tipoReceita" th:field="*{tipoReceita}" required>
                <option value="doce">Doce</option>
                <option value="salgada">Salgada</option>
            </select>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn">Salvar</button>
            <a th:href="@{/receitas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

</body>
</html>
